<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — EXE Development</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #080808; --surface: rgba(22,22,22,0.88); --border: rgba(255,255,255,0.09); --text: #e8e8e8; --text-dim: rgba(232,232,232,0.52); --text-dimmer: rgba(232,232,232,0.28); --font-mono: 'DM Mono', monospace; --font-ui: 'Outfit', sans-serif; --font-display: 'Syne', sans-serif; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-ui); padding: 80px 24px; min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; opacity: 0.35; }
  .wrap { max-width: 600px; margin: 0 auto; position: relative; z-index: 1; }
  .back { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dimmer); text-decoration: none; margin-bottom: 40px; transition: color 0.2s; }
  .back:hover { color: var(--text-dim); }
  h1 { font-family: var(--font-display); font-size: 38px; font-weight: 800; letter-spacing: -1px; color: #fff; margin-bottom: 8px; }
  .sub { font-size: 15px; color: var(--text-dim); margin-bottom: 40px; line-height: 1.65; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 36px; backdrop-filter: blur(12px); }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dimmer); margin-bottom: 8px; }
  .field input, .field textarea, .field select { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text); padding: 11px 14px; font-family: var(--font-mono); font-size: 12px; border-radius: 8px; outline: none; transition: all 0.2s; resize: vertical; appearance: none; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.07); }
  .field input::placeholder, .field textarea::placeholder { color: var(--text-dimmer); }
  .field select option { background: #1e1e1e; }
  .btn-submit { width: 100%; padding: 13px; font-family: var(--font-display); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; background: #fff; color: #000; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .btn-submit:hover { background: rgba(255,255,255,0.88); }
  .success { display: none; text-align: center; padding: 20px 0; }
  .success h3 { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .success p { font-size: 14px; color: var(--text-dim); }
  .success-icon { font-size: 36px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back">← EXE Development</a>
  <h1>Contact us.</h1>
  <p class="sub">Questions about Sentinel, your EXE account, billing, or partnerships? Send us a message and we'll get back to you.</p>
  <div class="card">
    <div id="form-area">
      <div class="field">
        <label>Your name</label>
        <input type="text" placeholder="Name" id="c-name">
      </div>
      <div class="field">
        <label>Email address</label>
        <input type="text" placeholder="you@example.com" id="c-email">
      </div>
      <div class="field">
        <label>Topic</label>
        <select id="c-topic">
          <option value="">Select a topic…</option>
          <option>Sentinel — Billing question</option>
          <option>Sentinel — Technical support</option>
          <option>EXE account help</option>
          <option>Partnership inquiry</option>
          <option>Legal / Privacy</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Message</label>
        <textarea rows="5" placeholder="Describe your question or issue…" id="c-message"></textarea>
      </div>
      <button class="btn-submit" onclick="sendContact()">Send message</button>
    </div>
    <div class="success" id="success-msg">
      <div class="success-icon">✓</div>
      <h3>Message sent.</h3>
      <p>We'll get back to you at the email you provided.</p>
    </div>
  </div>
</div>
<script>
function sendContact() {
  const name = document.getElementById('c-name').value.trim();
  const email = document.getElementById('c-email').value.trim();
  const topic = document.getElementById('c-topic').value;
  const msg = document.getElementById('c-message').value.trim();
  if (!name || !email || !topic || !msg) { alert('Please fill in all fields.'); return; }
  document.getElementById('form-area').style.display = 'none';
  document.getElementById('success-msg').style.display = 'block';
}
</script>
</body>
</html>
